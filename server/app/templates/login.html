<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spatika Health API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }

        .card {
            background-color: #1e293b;
            border-color: #334155;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">

    <div class="card border rounded-lg p-8 shadow-2xl w-full max-w-sm">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-400">Spatika Health</h1>
            <p class="text-xs text-slate-400 mt-1">Fleet Management Portal</p>
        </div>

        {% if error %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 p-2 rounded text-xs mb-4 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="post" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1" for="username">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full bg-slate-800 border border-slate-600 rounded text-sm px-3 py-2 text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1" for="password">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-slate-800 border border-slate-600 rounded text-sm px-3 py-2 text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 transition text-white font-bold py-2 rounded shadow-lg mt-2 text-sm">
                Login to Dashboard
            </button>
        </form>

        <div class="mt-6 border-t border-slate-700 pt-4 text-center">
            <p class="text-[10px] text-slate-500">Contact admin for credentials if needed.</p>
        </div>
    </div>

</body>

</html>
